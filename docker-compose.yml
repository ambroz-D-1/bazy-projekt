services:
  oracle-xe:
    image: gvenzl/oracle-xe:21-slim
    container_name: pegasus-db
    ports:
      - "1522:1521"
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD}
    env_file:
      - .env
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./pegasus/sql:/sql
    healthcheck:
      test: [ "CMD", "healthcheck.sh" ]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 180s

  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: pegasus-cloudbeaver
    ports:
      - "8978:8978"
    volumes:
      - cloudbeaver-data:/opt/cloudbeaver/workspace
    depends_on:
      oracle-xe:
        condition: service_healthy
    restart: unless-stopped

volumes:
  oracle-data:
    name: pegasus-oracle-data
  cloudbeaver-data:
    name: pegasus-cloudbeaver-data
